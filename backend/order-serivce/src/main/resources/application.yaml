server:
  port: 8080

spring:
  application:
    name: order-service

  mvc:
    throw-exception-if-no-handler-found: true
    web:
      resources:
        add-mappings: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  security:
    oauth2:
      client:
        registration:
          order-service:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI}
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

product-service:
  base-url: ${PRODUCT_SERVICE_BASE_URL}
  timeout:
    connect-ms: 1000
    response-ms: 3000

inventory-service:
  base-url: ${INVENTORY_SERVICE_BASE_URL}
  timeout:
    connect-ms: 1000
    response-ms: 3000

cart-service:
  base-url: ${CART_SERVICE_BASE_URL}
  timeout:
    connect-ms: 1000
    response-ms: 3000

payment-service:
  base-url: ${PAYMENT_SERVICE_BASE_URL}
  timeout:
    connect-ms: 1000
    response-ms: 3000

messaging:
  outbox:
    batch-size: 10
    fixed-delay-ms: 5000
    next-attempt-backoff-min: 5
  inbox:
    batch-size: 10
    fixed-delay-ms: 5000
    next-attempt-backoff-min: 5
    max-retries: 3

logging:
  level:
    org:
      hibernate:
        SQL: WARN
        orm:
          jdbc:
            bind: WARN
        type:
          descriptor:
            sql: TRACE

aws:
  region: ${AWS_REGION}
  sns:
    topic-arn: ${SNS_ORDER_EVENTS_TOPIC_ARN}
  sqs:
    queue-url: ${SQS_ORDER_PAYMENT_QUEUE_URL}
    poll:
      max-messages: 10
      wait-time-seconds: 10