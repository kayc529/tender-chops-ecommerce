server:
  port: 8080

spring:
  application:
    name: inventory-service

  mvc:
    throw-exception-if-no-handler-found: true
    web:
      resources:
        add-mappings: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

jobs:
  reservation-expiry:
    batch-size: 10
    fixed-delay-ms: 30000

inventory:
  reservation:
    ttl: 15m

messaging:
  outbox:
    batch-size: 10
    fixed-delay-ms: 5000
    next-attempt-backoff-min: 5
  inbox:
    batch-size: 10
    fixed-delay-ms: 5000
    next-attempt-backoff-min: 5
    max-retries: 3

aws:
  region: ${AWS_REGION}
  sns:
    topic-arn: ${SNS_INVENTORY_EVENTS_TOPIC_ARN}
  sqs:
    queues:
      - name: product-events
        queue-url: ${SQS_INVENTORY_PRODUCT_QUEUE_URL}
      - name: order-events
        queue-url: ${SQS_INVENTORY_ORDER_QUEUE_URL}
      - name: payment-events
        queue-url: ${SQS_INVENTORY_PAYMENT_QUEUE_URL}
    poll:
      max-messages: 10
      wait-time-seconds: 10

logging:
  level:
    org:
      hibernate:
        SQL: WARN
        orm:
          jdbc:
            bind: WARN
        type:
          descriptor:
            sql: TRACE