server:
  port: 8080

spring:
  application:
    name: product-service

  mvc:
    throw-exception-if-no-handler-found: true
    web:
      resources:
        add-mappings: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  security:
    oauth2:
      client:
        registration:
          product-service:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI}
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 50
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

inventory-service:
  base-url: ${INVENTORY_SERVICE_BASE_URL}
  timeout:
    connect-ms: 1000
    response-ms: 3000

jobs:
  product-stale-image-cleanup:
    batch-size: 10
    fixed-delay-ms: 30000

app:
  media:
    base-url: ${MEDIA_BASE_URL}
  cache:
    key-version: v1
    product-list-ttl-minutes: 3
    product-detail-ttl-minutes: 15

messaging:
  outbox:
    batch-size: 10
    fixed-delay-ms: 5000
    next-attempt-backoff-min: 5
  inbox:
    batch-size: 10
    fixed-delay-ms: 5000
    next-attempt-backoff-min: 5
    max-retries: 3

aws:
  region: ${AWS_REGION}
  s3:
    region: ${AWS_REGION}
    original-bucket-name: ${ORIGINAL_BUCKET_NAME}
    thumbnail-bucket-name: ${THUMBNAIL_BUCKET_NAME}
    presign-duration-minutes: 5
  secrets:
    image-processor-callback-secret: ${LAMBDA_IMAGE_PROCESSOR_SECRET}
  sns:
    topic-arn: ${SNS_PRODUCT_EVENTS_TOPIC_ARN}
  sqs:
    queue-url: ${SQS_PRODUCT_INVENTORY_QUEUE_URL}
    poll:
      max-messages: 10
      wait-time-seconds: 10

logging:
  level:
    org:
      hibernate:
        SQL: WARN
        orm:
          jdbc:
            bind: WARN
        type:
          descriptor:
            sql: TRACE

management:
  health:
    redis:
      enabled: false




