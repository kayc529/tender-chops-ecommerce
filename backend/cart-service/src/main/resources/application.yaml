server:
  port: 8080

spring:
  application:
    name: cart-service

  mvc:
    throw-exception-if-no-handler-found: true
    web:
      resources:
        add-mappings: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  security:
    oauth2:
      client:
        registration:
          cart-service:
            provider: keycloak
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI}
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

product-service:
  base-url: ${PRODUCT_SERVICE_BASE_URL}
  timeout:
    connect-ms: 1000
    response-ms: 3000

inventory-service:
  base-url: ${INVENTORY_SERVICE_BASE_URL}
  timeout:
    connect-ms: 1000
    response-ms: 3000

logging:
  level:
    org:
      hibernate:
        SQL: WARN
        orm:
          jdbc:
            bind: WARN
        type:
          descriptor:
            sql: TRACE

