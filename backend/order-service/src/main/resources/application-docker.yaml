spring:
  security:
    oauth2:
      client:
        provider:
          keycloak:
            token-uri: http://keycloak:8080/realms/tender-chops-test/protocol/openid-connect/token
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8080/realms/tender-chops-test/protocol/openid-connect/certs


product-service:
  base-url: http://product-service:8080/api/v1

inventory-service:
  base-url: http://inventory-service:8080/api/v1

cart-service:
  base-url: http://cart-service:8080/api/v1

payment-service:
  base-url: http://payment-service:8080/api/v1