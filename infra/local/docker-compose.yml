name: keycloak

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.4.4
    command:
      - start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

  redis:
    image: redis:7
    ports:
      - 6379:6379

  product-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${PRODUCT_DB_NAME}
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
    volumes:
      - product_service_data:/var/lib/postgresql/data
    ports:
      - 5433:5432

  cart-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${CART_DB_NAME}
      POSTGRES_USER: ${CART_DB_USER}
      POSTGRES_PASSWORD: ${CART_DB_PASSWORD}
    volumes:
      - cart_service_data:/var/lib/postgresql/data
    ports:
      - 5434:5432

  inventory-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${INVENTORY_DB_NAME}
      POSTGRES_USER: ${INVENTORY_DB_USER}
      POSTGRES_PASSWORD: ${INVENTORY_DB_PASSWORD}
    volumes:
      - inventory_service_data:/var/lib/postgresql/data
    ports:
      - 5435:5432

  order-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${ORDER_DB_NAME}
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
    volumes:
      - order_service_data:/var/lib/postgresql/data
    ports:
      - 5436:5432

  payment-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${PAYMENT_DB_NAME}
      POSTGRES_USER: ${PAYMENT_DB_USER}
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD}
    volumes:
      - payment_service_data:/var/lib/postgresql/data
    ports:
      - 5437:5432

  #######################
  #       SERVICES      #
  #######################

  product-service:
    image: product-service:local
    depends_on:
      - keycloak
      - product-db
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${PRODUCT_DB_HOST}
      DB_PORT: 5432
      DB_NAME: ${PRODUCT_DB_NAME}
      DB_USER: ${PRODUCT_DB_USER}
      DB_PASSWORD: ${PRODUCT_DB_PASSWORD}
      KEYCLOAK_HOST: ${KEYCLOAK_HOST}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_PRODUCT_SERVICE_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_PRODUCT_SERVICE_SECRET}
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_REGION: ${AWS_REGION}
      AWS_SHARED_CREDENTIALS_FILE: ${AWS_SHARED_CREDENTIALS_FILE}
      AWS_CONFIG_FILE: ${AWS_CONFIG_FILE}
      LAMBDA_IMAGE_PROCESSOR_SECRET: ${AWS_LAMBDA_IMAGE_PROCESSOR_SECRET}
      MEDIA_BASE_URL: ${AWS_S3_MEDIA_BASE_URL}
      ORIGINAL_BUCKET_NAME: ${AWS_S3_ORIGINAL_IMAGE_BUCKET_NAME}
      THUMBNAIL_BUCKET_NAME: ${AWS_S3_THUMBNAIL_IMAGE_BUCKET_NAME}
      SNS_PRODUCT_EVENTS_TOPIC_ARN: ${AWS_SNS_PRODUCT_EVENTS_TOPIC_ARN}
      SQS_PRODUCT_INVENTORY_QUEUE_URL: ${AWS_SQS_PRODUCT_INVENTORY_QUEUE_URL}
    volumes:
      - ~/.aws:/root/.aws:ro
    ports:
      - 8081:8080

  cart-service:
    image: cart-service:local
    depends_on:
      - keycloak
      - cart-db
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${CART_DB_HOST}
      DB_PORT: 5432
      DB_NAME: ${CART_DB_NAME}
      DB_USER: ${CART_DB_USER}
      DB_PASSWORD: ${CART_DB_PASSWORD}
      KEYCLOAK_HOST: ${KEYCLOAK_HOST}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CART_SERVICE_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CART_SERVICE_SECRET}
    ports:
      - 8082:8080

  inventory-service:
    image: inventory-service:local
    depends_on:
      - keycloak
      - inventory-db
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${INVENTORY_DB_HOST}
      DB_PORT: 5432
      DB_NAME: ${INVENTORY_DB_NAME}
      DB_USER: ${INVENTORY_DB_USER}
      DB_PASSWORD: ${INVENTORY_DB_PASSWORD}
      KEYCLOAK_HOST: ${KEYCLOAK_HOST}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_REGION: ${AWS_REGION}
      AWS_SHARED_CREDENTIALS_FILE: ${AWS_SHARED_CREDENTIALS_FILE}
      AWS_CONFIG_FILE: ${AWS_CONFIG_FILE}
      SNS_INVENTORY_EVENTS_TOPIC_ARN: ${AWS_SNS_INVENTORY_EVENTS_TOPIC_ARN}
      SQS_INVENTORY_PRODUCT_QUEUE_URL: ${AWS_SQS_INVENTORY_PRODUCT_QUEUE_URL}
      SQS_INVENTORY_ORDER_QUEUE_URL: ${AWS_SQS_INVENTORY_ORDER_QUEUE_URL}
      SQS_INVENTORY_PAYMENT_QUEUE_URL: ${AWS_SQS_INVENTORY_PAYMENT_QUEUE_URL}
    volumes:
      - ~/.aws:/root/.aws:ro
    ports:
      - 8083:8080

  order-service:
    image: order-service:local
    depends_on:
      - keycloak
      - order-db
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${ORDER_DB_HOST}
      DB_PORT: 5432
      DB_NAME: ${ORDER_DB_NAME}
      DB_USER: ${ORDER_DB_USER}
      DB_PASSWORD: ${ORDER_DB_PASSWORD}
      KEYCLOAK_HOST: ${KEYCLOAK_HOST}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_ORDER_SERVICE_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_ORDER_SERVICE_SECRET}
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_REGION: ${AWS_REGION}
      AWS_SHARED_CREDENTIALS_FILE: ${AWS_SHARED_CREDENTIALS_FILE}
      AWS_CONFIG_FILE: ${AWS_CONFIG_FILE}
      SNS_ORDER_EVENTS_TOPIC_ARN: ${AWS_SNS_ORDER_EVENTS_TOPIC_ARN}
      SQS_ORDER_PAYMENT_QUEUE_URL: ${AWS_SQS_ORDER_PAYMENT_QUEUE_URL}
    volumes:
      - ~/.aws:/root/.aws:ro
    ports:
      - 8084:8080

  payment-service:
    image: payment-service:local
    depends_on:
      - keycloak
      - payment-db
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: ${PAYMENT_DB_HOST}
      DB_PORT: 5432
      DB_NAME: ${PAYMENT_DB_NAME}
      DB_USER: ${PAYMENT_DB_USER}
      DB_PASSWORD: ${PAYMENT_DB_PASSWORD}
      KEYCLOAK_HOST: ${KEYCLOAK_HOST}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_PAYMENT_SERVICE_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_PAYMENT_SERVICE_SECRET}
      STRIPE_WEBHOOK_SIGNING_SECRET: ${STRIPE_WEBHOOK_SIGNING_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      AWS_PROFILE: ${AWS_PROFILE}
      AWS_REGION: ${AWS_REGION}
      AWS_SHARED_CREDENTIALS_FILE: ${AWS_SHARED_CREDENTIALS_FILE}
      AWS_CONFIG_FILE: ${AWS_CONFIG_FILE}
      SNS_PAYMENT_EVENTS_TOPIC_ARN: ${AWS_SNS_PAYMENT_EVENTS_TOPIC_ARN}
      SQS_PAYMENT_ORDER_QUEUE_URL: ${AWS_SQS_PAYMENT_ORDER_QUEUE_URL}
    volumes:
      - ~/.aws:/root/.aws:ro
    ports:
      - 8085:8080

volumes:
  keycloak_data:
  product_service_data:
  cart_service_data:
  inventory_service_data:
  order_service_data:
  payment_service_data:
